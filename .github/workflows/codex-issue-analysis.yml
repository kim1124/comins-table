name: Codex Issue Analysis

on:
  issues:
    types: [opened, edited, reopened, labeled]

permissions: {}

concurrency:
  group: codex-issue-${{ github.repository }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze issue
    if: >-
      (github.event.action != 'labeled' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
      github.event.issue.author_association)) ||
      (github.event.action == 'labeled' &&
      github.event.label.name == 'codex:analyze')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Prepare untrusted issue context
        shell: bash
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_LABELS_JSON: ${{ toJSON(github.event.issue.labels.*.name) }}
        run: |
          set -euo pipefail
          input_path='.github/codex/issue-analysis.input.md'
          cp '.github/codex/issue-analysis.prompt.md' "$input_path"
          {
            printf '\n\n## Untrusted GitHub issue data\n\n'
            jq -n \
              --arg number "$ISSUE_NUMBER" \
              --arg title "$ISSUE_TITLE" \
              --arg body "$ISSUE_BODY" \
              --arg url "$ISSUE_URL" \
              --arg author "$ISSUE_AUTHOR" \
              --argjson labels "$ISSUE_LABELS_JSON" \
              '{
                number: ($number | tonumber),
                title: $title,
                body: ($body | gsub("<!--.*?-->"; ""; "s") | .[0:20000]),
                url: $url,
                author: $author,
                labels: $labels
              }'
          } >> "$input_path"

      - name: Run read-only Codex analysis
        id: codex
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/issue-analysis.input.md
          output-schema-file: .github/codex/issue-analysis.schema.json
          permission-profile: ':read-only'
          safety-strategy: drop-sudo
          codex-args: '["--ephemeral"]'

  post_analysis:
    name: Post analysis
    needs: analyze
    if: ${{ needs.analyze.outputs.final_message != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Create or update analysis comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.analyze.outputs.final_message }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const analysis = JSON.parse(process.env.CODEX_FINAL_MESSAGE);
            const escapeHtml = (value) => value
              .replaceAll('&', '&amp;')
              .replaceAll('<', '&lt;')
              .replaceAll('>', '&gt;');
            const marker = '<!-- comins-codex-issue-analysis -->';
            const body = [
              marker,
              '## Codex issue analysis',
              '',
              '> 자동 분석 결과이며 구현 또는 배포 승인이 아닙니다.',
              '',
              `<pre>${escapeHtml(JSON.stringify(analysis, null, 2))}</pre>`,
              '',
              '관리자가 범위와 권한을 검토한 후 다음 작업을 지시합니다.',
            ].join('\n');
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100,
              },
            );
            const previous = comments.find((comment) =>
              comment.user?.type === 'Bot' &&
              comment.body?.includes(marker),
            );
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
            }
