name: Stage npm package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact package.json version to stage
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: npm-stage
  cancel-in-progress: false

jobs:
  verify-and-pack:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: '8.30.1'
      GITLEAKS_ARCHIVE: gitleaks_8.30.1_linux_x64.tar.gz
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Verify requested version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: >-
          node -e 'const { version } = require("./package.json");
          if (version !== process.env.REQUESTED_VERSION) process.exit(1);'
      - name: Require bootstrap package
        run: >-
          node -e 'const { execFileSync } = require("node:child_process");
          const { name } = require("./package.json");
          execFileSync("npm", ["view", name, "version"], { stdio: "inherit" });'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run verify:full
      - run: npm run test:consumer
      - name: Install pinned Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          archive_path=$(mktemp "${RUNNER_TEMP}/comins-gitleaks.XXXXXX.tar.gz")
          trap 'rm -f "$archive_path"' EXIT
          curl --fail --silent --show-error --location \
            --output "$archive_path" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${GITLEAKS_ARCHIVE}"
          printf '%s  %s\n' "$GITLEAKS_SHA256" "$archive_path" | sha256sum --check --status
          install -d .local/bin
          tar -xzf "$archive_path" -C .local/bin gitleaks
          test "$(.local/bin/gitleaks version)" = "$GITLEAKS_VERSION"
      - name: Pack and scan the exact artifact
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          package_file=$(node scripts/verify-package-artifact.mjs)
          extract_dir=$(mktemp -d "${RUNNER_TEMP}/comins-package.XXXXXX")
          gitleaks_output=$(mktemp "${RUNNER_TEMP}/comins-package-gitleaks.XXXXXX")
          trap 'rm -rf "$extract_dir"; rm -f "$gitleaks_output"' EXIT
          tar -xzf "$package_file" -C "$extract_dir"
          if ! .local/bin/gitleaks dir "$extract_dir/package" \
            --config .gitleaks.toml \
            --redact \
            --ignore-gitleaks-allow \
            --no-banner \
            --no-color \
            --log-level error \
            >"$gitleaks_output" 2>&1; then
            printf '%s\n' 'sensitive-data-check: failed' >&2
            exit 1
          fi
          printf 'package-file=%s\n' "$package_file" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package-${{ inputs.version }}
          path: ${{ steps.pack.outputs.package-file }}
          if-no-files-found: error
          retention-days: 1

  stage:
    needs: verify-and-pack
    if: github.ref == 'refs/heads/main'
    environment: npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@11.15.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package-${{ inputs.version }}
          path: package-artifact
      - run: npm stage publish ./package-artifact/*.tgz --access public
