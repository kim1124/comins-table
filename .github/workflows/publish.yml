name: Stage npm package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact package.json version to stage
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: npm-stage
  cancel-in-progress: false

jobs:
  verify-and-pack:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Verify requested version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: >-
          node -e 'const { version } = require("./package.json");
          if (version !== process.env.REQUESTED_VERSION) {
          console.error(`Expected ${version}, received ${process.env.REQUESTED_VERSION}`);
          process.exit(1); }'
      - name: Require bootstrap package
        run: >-
          node -e 'const { execFileSync } = require("node:child_process");
          const { name } = require("./package.json");
          execFileSync("npm", ["view", name, "version"], { stdio: "inherit" });'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run verify:full
      - run: npm run test:consumer
      - run: npm pack --dry-run --json
      - name: Pack verified artifact
        id: pack
        run: >-
          npm pack --json |
          node -e 'const fs = require("node:fs");
          const [pack] = JSON.parse(fs.readFileSync(0, "utf8"));
          if (!pack?.filename) process.exit(1);
          process.stdout.write(`package-file=${pack.filename}\n`);' >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package-${{ inputs.version }}
          path: ${{ steps.pack.outputs.package-file }}
          if-no-files-found: error
          retention-days: 1

  stage:
    needs: verify-and-pack
    if: github.ref == 'refs/heads/main'
    environment: npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@11.15.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package-${{ inputs.version }}
          path: package-artifact
      - run: npm stage publish ./package-artifact/*.tgz --access public
