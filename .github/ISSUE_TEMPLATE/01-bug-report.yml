name: 버그·성능 문제
description: 잘못된 동작, 회귀, 성능 저하 또는 호환성 문제를 알려주세요.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        구현 방법이나 수정 범위를 정할 필요는 없습니다. 관찰한 사실과 재현 정보를 작성해 주세요.
        공개하면 안 되는 보안 취약점은 이슈를 생성하지 말고 저장소의 Security policy를 이용해 주세요.
  - type: textarea
    id: behavior
    attributes:
      label: 현상과 기대 결과
      description: 현재 발생하는 동작, 기대한 동작, 사용에 미치는 영향을 함께 작성해 주세요.
      placeholder: 현재 동작과 기대 결과를 비교해 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 재현 방법
      description: 재현 순서, 최소 예제 링크, 관련 코드나 설정을 작성해 주세요. 성능 문제라면 데이터 규모와 측정 결과도 포함해 주세요.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 사용 환경
      description: 확인 가능한 범위에서 버전 정보를 작성해 주세요.
      value: |
        Comins:
        React:
        Browser:
        Node:
        Package manager:
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: 추가 자료
      description: 로그, 스크린샷, 임시 우회 방법이 있다면 첨부해 주세요.
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: 제출 전 확인
      options:
        - label: 기존 이슈에서 같은 문제를 검색했습니다.
          required: true
        - label: 로그, 이미지와 예제에서 개인정보, 자격 증명과 토큰을 제거했습니다.
          required: true
        - label: 공개 이슈로 처리하면 안 되는 보안 취약점 제보가 아닙니다.
          required: true
