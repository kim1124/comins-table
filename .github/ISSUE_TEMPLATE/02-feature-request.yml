name: 기능·개선 요청
description: 해결하려는 문제와 기대 결과를 알려주세요.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        API나 구현 방법을 설계할 필요는 없습니다. 필요한 사용 경험과 기대 결과를 작성해 주세요.
        공개하면 안 되는 보안 취약점은 이슈를 생성하지 말고 저장소의 Security policy를 이용해 주세요.
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제와 사용 사례
      description: 어떤 상황에서 어떤 문제가 있으며 누가 이 기능을 사용하는지 작성해 주세요.
      placeholder: 현재 해결하기 어려운 문제와 실제 사용 상황을 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: 기대하는 결과
      description: 요청이 반영되면 어떤 동작이 가능해야 하는지 작성해 주세요.
      placeholder: 구현 방식보다 사용자가 얻게 될 결과를 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 현재 대안과 제약
      description: 현재 사용 중인 우회 방법이나 유지되어야 할 기존 동작이 있다면 작성해 주세요.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: 추가 자료
      description: 원하는 사용 예시, 이미지 또는 참고 링크가 있다면 첨부해 주세요.
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: 제출 전 확인
      options:
        - label: 기존 이슈에서 같은 요청을 검색했습니다.
          required: true
        - label: 첨부 자료에서 개인정보, 자격 증명과 토큰을 제거했습니다.
          required: true
        - label: 공개 이슈로 처리하면 안 되는 보안 취약점 제보가 아닙니다.
          required: true
